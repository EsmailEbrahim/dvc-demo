stages:
  preprocess:
    cmd: python src/preprocess.py
    deps:
    - data/raw/employees.csv
    - src/preprocess.py
    outs:
    - data/processed/employees_clean.csv
  train:
    cmd: python src/train.py
    deps:
    - data/processed/employees_clean.csv
    - src/train.py
    outs:
    - models/model.pkl
